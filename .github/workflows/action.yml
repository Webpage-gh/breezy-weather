name: Build unsigned arm64-v8a release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'basic'
        type: choice
        options:
          - basic
          - freenet

jobs:
  build:
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Lint
        run: ./gradlew spotlessCheck

      - name: Clean build
        run: ./gradlew clean

      - name: Assemble ${{ github.event.inputs.flavor }} release (arm64-v8a only, unsigned)
        run: ./gradlew assemble${{ github.event.inputs.flavor == 'freenet' && 'Freenet' || 'Basic' }}Release -Pbreezy -Pandroid.injected.build.abi=arm64-v8a
        # /!\ You’re NOT allowed to redistribute modified APKs with the breezy config enabled, see license terms

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Breezy-weather
          path: app/build/outputs/apk/**/*.apk
    
